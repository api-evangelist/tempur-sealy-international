name: Tempur Sealy International
description: >-
  Tempur Sealy International is one of the world's largest bedding providers,
  developing, manufacturing, marketing, and distributing bedding products under the
  Tempur-Pedic, Sealy, and Stearns & Foster brands. As a Fortune 500 manufacturer and
  retailer, the company operates e-commerce platforms and provides retailer integration
  APIs for product catalogs, inventory, and order management.
