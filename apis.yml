    description: >-
      E-commerce integration API for the Sealy brand providing access to product
      catalogs, availability, and order management for Sealy Posturepedic, Sealy,
      and Cocoon mattress product lines across retail and direct-to-consumer channels.
    humanURL: https://www.sealy.com/
