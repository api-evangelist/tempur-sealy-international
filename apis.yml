apis:
  - name: Tempur-Pedic E-Commerce API
    description: >-
      E-commerce integration API for the Tempur-Pedic brand enabling retailers,
      affiliates, and platform partners to access product catalogs, check inventory,
      manage orders, and track shipments for Tempur-Pedic mattresses, pillows,
      and accessories. Used for retailer inventory synchronization and order fulfillment.
    humanURL: https://www.tempurpedic.com/
    baseURL: https://api.tempurpedic.com
    tags:
